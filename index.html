<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Jardín de Poemas - Para el amor de mi vida</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fdf8f0 0%, #f7eae0 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1.5rem 1rem;
            color: #2c2418;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .dedicatoria {
            text-align: center;
            max-width: 600px;
            margin: 0 auto 2rem auto;
            font-size: 0.95rem;
            color: #945325;
            font-style: italic;
            border: 1px solid rgba(226, 196, 156, 0.4);
            padding: 1rem 1.5rem;
            background: #fffbf5;
            border-radius: 50px;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(180, 95, 43, 0.04);
        }

        /* DISEÑO DE MOSAICO (Masonry) PARA PANTALLAS MEDIANAS Y GRANDES */
        .poemas-container {
            max-width: 1200px;
            margin: 0 auto;
            columns: 1; /* Por defecto en móviles una sola columna */
            column-gap: 1.5rem;
        }

        .poema-card {
            background: #fffefb;
            border-radius: 1.25rem;
            box-shadow: 0 10px 25px rgba(44, 36, 24, 0.05), 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
            border: 1px solid rgba(226, 196, 156, 0.35);
            display: inline-block; /* Evita que la tarjeta se parta entre columnas */
            width: 100%;
            margin-bottom: 1.5rem; /* Separación vertical en modo mosaico */
            backface-visibility: hidden;
        }

        @media (hover: hover) {
            .poema-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 15px 30px rgba(180, 95, 43, 0.08);
                border-color: rgba(180, 95, 43, 0.3);
            }
        }

        .poema-card:active {
            transform: scale(0.98);
        }

        .poema-header {
            padding: 1.2rem 1.4rem 0.6rem 1.4rem;
            border-bottom: 1.5px dashed rgba(226, 196, 156, 0.5);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .poema-titulo {
            font-size: 1.35rem;
            font-weight: 700;
            color: #9e4f1d;
            margin: 0;
            font-family: 'Merriweather', 'Georgia', serif;
            line-height: 1.3;
            word-wrap: break-word;
        }

        .poema-fecha {
            font-size: 0.75rem;
            color: #b87c4f;
            background: #fff1e4;
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
            font-family: system-ui, sans-serif;
            font-weight: 500;
            display: inline-block;
            align-self: flex-start;
        }

        .poema-contenido {
            padding: 1.2rem 1.4rem;
            font-size: 1rem;
            line-height: 1.75;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Georgia', serif; /* Tipografía más romántica para el cuerpo */
            color: #3d3224;
        }

        .poema-footer {
            padding: 0.7rem 1.4rem 0.9rem 1.4rem;
            font-size: 0.7rem;
            color: #b5855c;
            border-top: 1px solid #f9f1e7;
            text-align: right;
            font-style: italic;
            background: #fffcf8;
            border-bottom-left-radius: 1.25rem;
            border-bottom-right-radius: 1.25rem;
        }

        /* ANIMACIÓN SUAVE AL CARGAR */
        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poema-card {
            animation: fadeSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* SCROLLBAR PERSONALIZADO */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fdf8f0;
        }
        ::-webkit-scrollbar-thumb {
            background: #d9bd9c;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c29f76;
        }

        /* RESPONSIVIDAD DINÁMICA POR COLUMNAS */
        @media (min-width: 650px) {
            .poemas-container {
                columns: 2;
            }
            body {
                padding: 2rem 1.5rem;
            }
        }

        @media (min-width: 980px) {
            .poemas-container {
                columns: 3;
            }
            .dedicatoria {
                font-size: 1.05rem;
                margin-bottom: 3rem;
            }
        }
    </style>
</head>
<body>

<div class="dedicatoria">
    ✨ Para la dueña de mis versos y corazón— cada poema crece con lo que siento por ti ✨
</div>

<div class="poemas-container" id="galeriaPoemas"></div>

<script>
    const poemas = [
        {
            titulo: "5 Meses a tu lado",
            contenido: `Amo tu mente, tu calma y tu brillo;
Contigo todo parece sencillo.
Me provocas un nudo de felicidad  pura,
al ver como pintas mi vida de ternura.
Cinco meses de admirar tu forma de amar,
y de agredecer de que me enseñes a mirar
el mundo con ojos de paz y de fe,
sabiendo que siempre a tu lado estaré.`,
            fecha: "07 de mayo, 2026"
        },
        {
            titulo: "Un semestre más",
            contenido: `Mi niña, ya vas para la escuela, así que te mando este mensajito rápido para que te acompañe en el camino. Sé que el cuerpo te pide cama y que vienes arrastrando el cansancio de toda la semana, pero ya no falta nada. Estás a unas horas de cerrar el semestre y salir invicta. Te mando un abrazo y te amito mucho mi corazón
Que tengas un lindo último día en la escuela💕.`,
            fecha: "22 Mayo 2026"
        },
                {
            titulo: "Un corto periodo sin ti",
            contenido: `Eimy, sé que desde el viernes hasta el domingo tus días van a estar ocupados. No quiero sumar ruido, corazón. Solo quiero que te lleves esto: no hace falta que me escribas a cada rato, ni que demuestres nada.
Obviamente te voy a extrañar mucho estos días, pero tu presencia no se mide en mensajes por hora; se mide en la claridad con la que estás en mi vida, y esa claridad no se apaga porque estés ocupada. Al contrario, se nota más cuando estás donde quieres estar. Así que ve y disfruta de todo. Si tienes señal y un minuto, me encantará saber de ti; si no, también está bien. Porque no te estoy esperando como quien espera que algo termine. Te estoy acompañando aunque no estemos juntos... eso también es distancia hecha certeza. Disfruta mucho a los tuyos, mi Cangrejito. Te amo muchísimo.`,
            fecha: "29 de mayo 2026"
        },
        {
            titulo: "Anatomía del misterio",
            contenido: `Aquel que aludió a la belleza del amor
es alguien que no conoce el amor.
Aquel que aludió a la fealdad del amor
es alguien que arrogantemente conoció el amor.

Yo solía buscarle definiciones al viento,
intentando explicar lo que no se podía medir,
hasta que llegaste a cambiar mi rumbo y mi tiempo
y me enseñaste lo que de verdad es sentir.

Contigo aprendí que el amor no es blanco ni negro,
ni una verdad absoluta que se pueda dictar;
es la magia que nace en cada pequeño destello,
el refugio perfecto donde quiero habitar.

No me importa entenderlo, ni buscar la certeza,
ni pretender saber lo que el mundo no entiende;
me basta mirarte, descubrir tu belleza
y cuidar este fuego que entre los dos se enciende.

Que digan los sabios lo que quieran del amor,
que intenten descifrarlo en su vana arrogancia;
yo me quedo contigo, con tu brillo y tu calor,
celebrando la vida que a tu lado toma importancia.`,
            fecha: "5 de junio, 2026"
        },
        {
            titulo: "Un amor paciente",
            contenido: `La distancia nos separa en kilómetros y caminos,
pero jamás ha podido separar aquello que sentimos.
Porque incluso cuando el mundo parece inmenso y vacío,
encuentro en tu recuerdo un refugio, un hogar, un motivo.

Es inevitable querer sentir el calor de tu ser
en las oscuras y frías noches,
cuando el silencio llena la habitación
y mi corazón pronuncia tu nombre en cada latido.

A veces miro el cielo buscando la misma luna que contemplas,
imaginando que su luz acaricia tu rostro
antes de llegar hasta mí.
Y entonces la distancia parece menos cruel,
porque sé que, de alguna forma, compartimos el mismo instante.

Pero si realmente es tu decisión amarme,
te puedo prometer amarte como nunca nadie lo ha hecho ni lo hará.
Prometo cuidar cada palabra tuya como un tesoro,
celebrar tus alegrías como si fueran mías
y sostenerte incluso cuando mis brazos no puedan alcanzarte.

Porque amar no siempre es tener cerca,
a veces es esperar, confiar y permanecer.
Es elegir a la misma persona una y otra vez,
aunque el tiempo, la ausencia y los kilómetros desafíen al corazón.

Y mientras llega el día en que nuestras manos se encuentren,
seguiré construyendo contigo este amor paciente y sincero,
porque hay distancias que separan cuerpos,
pero existen amores tan profundos
que ni el horizonte puede contenerlos.`,
            fecha: "05 de junio, 2026"
        },
        {
            titulo: "Seis meses: La certeza de nosotros",
            contenido: `Dicen que el amor es un camino llano,
pero nosotros sabemos que no es así;
que hay días cansados, inviernos tempranos,
y pasos en falso que di junto a ti.
Sé que no he sido el mejor en el viaje,
que arrastro mis sombras, que suelo fallar,
pero eres el norte de todo mi mapa,
el único puerto donde quiero encallar.

Medio año, mi cielo, de ver el destino
con una mirada que no duda más;
seis meses tejiendo un mismo camino,
sabiendo que donde tú vas, yo voy detrás.
No importa la distancia, ni el tiempo, ni el ruido,
ni el mundo que a veces nos quiere cansar;
tu amor en mi vida es el pulso encendido,
el faro constante que me hace avanzar.

Hoy miro el futuro y no busco respuestas,
me basta saber que te elijo otra vez.
Dejo en tus manos mis cartas apuestas,
con la madurez que me da tu calidez.
Porque no quiero un amor de un momento,
ni un hilo que el tiempo pueda deshacer;
mi meta es el altar, mi firme juramento:
unir nuestras vidas y verte crecer.

Felices seis meses, mi niña. Gracias por enseñarme lo que de verdad es sentir.
            .`,
            fecha: "2 sept 2023"
        },
    /*<!--
        {
            titulo: "Breve como un suspiro",
            contenido: `Tú.
Siempre tú.`,
            fecha: "ayer"
        }
*/
    ];

    function escaparHTML(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    function renderizarPoemas() {
        const contenedor = document.getElementById('galeriaPoemas');
        if (!contenedor) return;
        
        contenedor.innerHTML = '';
        
        if (poemas.length === 0) {
            const mensajeVacio = document.createElement('div');
            mensajeVacio.className = 'poema-card';
            mensajeVacio.style.textAlign = 'center';
            mensajeVacio.style.padding = '2rem';
            mensajeVacio.innerHTML = `
                <div class="poema-contenido" style="font-style: italic; color:#b48a64;">
                    💭 Pronto llenaré estos versos para ti...
                </div>
            `;
            contenedor.appendChild(mensajeVacio);
            return;
        }
        
        poemas.forEach((poema, index) => {
            const card = document.createElement('article');
            card.className = 'poema-card';
            
            // Retiramos los espacios extras iniciales/finales del contenido original
            const contenidoLimpio = poema.contenido ? poema.contenido.trim() : '';
            
            const tituloMostrar = poema.titulo && poema.titulo.trim() !== "" ? poema.titulo : "Poema sin título";
            const fechaMostrar = poema.fecha && poema.fecha.trim() !== "" ? poema.fecha : "sin fecha";
            const contenidoConSaltos = escaparHTML(contenidoLimpio).replace(/\n/g, '<br>');
            
            card.innerHTML = `
                <div class="poema-header">
                    <h2 class="poema-titulo">${escaparHTML(tituloMostrar)}</h2>
                    <span class="poema-fecha">${escaparHTML(fechaMostrar)}</span>
                </div>
                <div class="poema-contenido">${contenidoConSaltos || '<em>… un verso que espera ser escrito …</em>'}</div>
                <div class="poema-footer">
                    🌹 dedicado con el corazón &nbsp;•&nbsp; ${index + 1}
                </div>
            `;
            contenedor.appendChild(card);
        });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        renderizarPoemas();
    });
</script>

</body>
</html>
